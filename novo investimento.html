<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>PatriControl</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/icones/patrimonio_branco.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <button id="botao-menu" onclick="abrirMenu(this)">
            <img src="assets/icones/menu-branco.png" alt="">
        </button>
    </header>
    <div style="display: flex;">
        <div class="overlay" onclick="abrirMenu(this)">
            
        </div>
        <aside id="aside">
            <img class="logo-empresa" src="assets/logos empresas/LOGO SOCIEDADE FRANCIOSI.png" alt="">
            <a href="user.html" class="conta-aside">  
                <div class="conta-aside-conteudo">
                    <img class="imagem-conta" src="assets/auxiliar/foto yan corporativa.jpeg" alt="">
                    <div>
                        <p class="titulo-pequeno">Yan Felipe Rodrigues</p>
                        <p class="subtitulo-pequeno">Assistente patrimonial</p>
                    </div>
                </div>
            </a>
            <nav class="navegacao-aside">
                <a href="index.html">
                    <img class="icon" src="assets/icones/dashboard_branco.png" alt="dashboard">
                    Dashboard
                </a>
                <a href="ativos.html">
                    <img class="icon" src="assets/icones/patrimonio_branco.png" alt="patrimonio">
                    Ativos
                </a>
                <a href="novo patrimonio.html">
                    <img class="icon" src="assets/icones/adicionar_branco.png" alt="novo patrimonio">
                    Novo Ativo
                </a>
                <a href="investimentos.html">
                    <img class="icon" src="assets/icones/imovel_branco.png" alt="patrimonio">
                    Investimentos
                </a>
                <a class="link-ativo" href="novo investimento.html">
                    <img class="icon" src="assets/icones/adicionar_branco.png" alt="novo patrimonio">
                    Novo Investimento
                </a>
            </nav>
        </aside>
        <main class="aparecer-baixo">
        
            <div class="informacoes-patrimonio-card">
                <p class="titulo-medio">Informações Básicas</p>
                <div class="box-inputs">
                    <div>
                        <label class="label-inputs" for="input-codigo-ativo">Código *</label>
                        <input class="input-grande" name="input-codigo-ativo" id="input-codigo-ativo" type="text" placeholder="Ex: INV-123" required>
                    </div>
                    <div>
                        <label class="label-inputs" for="input-descricao-ativo">Descrição *</label>
                        <input class="input-grande" name="input-descricao-ativo" id="input-descricao-ativo" type="text" placeholder="Ex: Poços artesianos" required>
                    </div>
                    <div>
                        <label class="label-inputs" for="select-status-ativo">Status *</label>
                        <select class="input-grande" name="select-status-ativo" id="select-status-ativo" required>
                            <option value="ATIVO" selected>Ativo</option>
                            <option value="INATIVO">Inativo</option>
                        </select>
                    </div>
                </div>
                <div class="box-inputs">
                    <div>
                        <label class="label-inputs" for="textarea-detalhamento-ativo">Detalhamento</label>
                        <textarea class="textarea-grande" name="textarea-detalhamento-ativo" id="textarea-detalhamento-ativo" placeholder="Informações extras..."></textarea>
                    </div>
                </div>
            </div>
            <div class="informacoes-patrimonio-card">
                <p class="titulo-medio">Localização/Data de icorporação</p>
                <div class="box-inputs">
                    <div>
                        <label class="label-inputs" for="input-localizacao-ativo">Localização *</label>
                        <select class="input-grande" name="input-localizacao-ativo" id="input-localizacao-ativo" type="text" required>
                            <option selected hidden></option>
                            <option value="SANTA LUCIA">Santa Lúcia</option>
                            <option value="GRANDE LESTE">Grande Leste</option>
                            <option value="SANTO EXPEDITO">Santo Expedito</option>
                            <option value="JATOBA">Jatobá</option>
                            <option value="ESCRITORIO CENTRAL">Escritório Central</option>
                            <option value="UBA">UBA</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-inputs" for="input-responsavel-ativo">Data inicial</label>
                        <input class="input-grande" name="input-responsavel-ativo" id="input-responsavel-ativo" type="date" placeholder="">
                    </div>
                </div>
            </div>
            <div class="informacoes-patrimonio-card">
                <p class="titulo-medio">Informações Financeiras</p>
                <div class="box-inputs">
                    <div>
                        <label class="label-inputs" for="input-valor-ativo">Valor atual *</label>
                        <input class="input-grande" name="input-valor-ativo" id="input-valor-ativo" type="number" placeholder="R$">
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="assets/js/novo patrimonio.js"></script>
    <script src="assets/js/geral.js"></script>
</body>


</html>
