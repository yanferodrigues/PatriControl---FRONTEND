<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>PatriControl</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/icones/patrimonio_branco.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header>
        <button id="botao-menu" onclick="abrirMenu(this)">
            <img src="assets/icones/menu-branco.png" alt="">
        </button>
    </header>
    <div style="display: flex;">
        <div class="overlay" onclick="abrirMenu(this)">
            
        </div>
        <aside id="aside">
            <img class="logo-empresa" src="assets/logos empresas/LOGO SOCIEDADE FRANCIOSI.png" alt="">
            <a href="user.html" class="conta-aside">  
                <div class="conta-aside-conteudo">
                    <img class="imagem-conta" src="assets/auxiliar/foto yan corporativa.jpeg" alt="">
                    <div>
                        <p class="titulo-pequeno">Yan Felipe Rodrigues</p>
                        <p class="subtitulo-pequeno">Assistente patrimonial</p>
                    </div>
                </div>
            </a>
            <nav class="navegacao-aside">
                <a href="index.html">
                    <img class="icon" src="assets/icones/dashboard_branco.png" alt="dashboard">
                    Dashboard
                </a>
                <a href="patrimonio.html">
                    <img class="icon" src="assets/icones/patrimonio_branco.png" alt="patrimonio">
                    Patrimônio
                </a>
                <a href="novo patrimonio.html">
                    <img class="icon" src="assets/icones/adicionar_branco.png" alt="novo patrimonio">
                    Novo Patrimônio
                </a>
            </nav>
        </aside>
        <main class="aparecer-baixo">
            <div class="main-topo">
                <div>
                    <p class="titulo-grande">Yan Felipe Rodrigues</p>
                    <p class="subtitulo-medio">Sociedade Franciosi</p>
                </div>
            </div>
            <div class="usuario-main">
                <div class="topo-usuario">
                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <label for="input-data-usuario">Data de incorporação:</label>
                            <p class="subtitulo-medio" id="input-data-usuario">19/03/2026</p>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <label for="input-tipo-usuario">Tipo de usuário:</label>
                            <p class="subtitulo-medio" id="input-tipo-usuario">Admin</p>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <label for="input-tipo-usuario">Empresa:</label>
                            <p class="subtitulo-medio" id="input-empresa-usuario">Sociedade Franciosi</p>
                        </div>
                    </div>
                    <img class="img-usuario" src="assets/auxiliar/foto yan corporativa.jpeg" alt="foto usuário">
                </div>

                <div style="display: flex; flex-direction: column; width: 60%; gap: 10px; min-width: 350px;">
                    <label for="input-email-usuario">Email</label>
                    <div style="display: flex; justify-content: center; align-items: center;">
                        <input type="email" id="input-email-usuario" class="inputs-usuario" value="yan.vieira@sociedadefranciosi.com.br" readonly>
                        <button class="btn-editar-usuario" style="border: transparent 1px solid; cursor:default;"></button>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; width: 60%; gap: 10px; min-width: 350px;">
                    <label for="input-nome-usuario">Nome</label>
                    <div style="display: flex; justify-content: center; align-items: center;">
                        <input type="text" id="input-nome-usuario" class="inputs-usuario" value="Yan Felipe Rodrigues Vieira" readonly>
                        <button class="btn-editar-usuario">
                            <img src="assets/icones/editar_branco.png" alt="">
                        </button>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column;width: 60%; gap: 10px; min-width: 350px;">
                    <label for="input-senha-usuario">Senha</label>
                    <div style="display: flex; justify-content: center; align-items: center;">
                        <input type="password" id="input-senha-usuario" class="inputs-usuario" value="adsfasdfasdfasf" readonly>
                        <button class="btn-editar-usuario">
                            <img src="assets/icones/editar_branco.png" alt="">
                        </button>
                    </div>
                </div>
                <button id="btn-logout"> Logout </button>
            </div>
        </main>
    </div>
    
    <script src="assets/js/dashboard.js"></script>
    <script src="assets/js/geral.js"></script>
</body>


</html>
