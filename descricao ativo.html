<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatriControl</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/icones/patrimonio_branco.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <aside>
        <img class="logo-empresa" src="assets/logos empresas/LOGO SOCIEDADE FRANCIOSI.png" alt="">
        <div class="conta-aside">  
            <div class="conta-aside-conteudo">
                <img class="imagem-conta" src="assets/auxiliar/foto yan corporativa.jpeg" alt="">
                <div>
                    <p class="titulo-pequeno">Yan Felipe Rodrigues</p>
                    <p class="subtitulo-pequeno">Assistente patrimonial</p>
                </div>
            </div>
        </div>
        <nav class="navegacao-aside">
            <a href="index.html">
                <img class="icon" src="assets/icones/dashboard_branco.png" alt="dashboard">
                Dashboard
            </a>
            <a class="link-ativo" href="patrimonio.html">
                <img class="icon" src="assets/icones/patrimonio_branco.png" alt="patrimonio">
                Patrimônio
            </a>
            <a href="novo patrimonio.html">
                <img class="icon" src="assets/icones/adicionar_branco.png" alt="novo patrimonio">
                Novo Patrimônio
            </a>
        </nav>
    </aside>
    <main class="aparecer-baixo">
        <div class="main-topo">
            <div>
                <p class="titulo-grande">IS001245</p>
                <p class="subtitulo-medio">TRATOR FARMALL 100</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="botao-editar">
                    Editar
                    <img src="assets/icones/editar_branco.png" alt="editar patrimonio">
                </button>
                <button class="botao-excluir">
                    Excluir
                    <img src="assets/icones/lixeira_branca.png" alt="excluir patrimonio">
                </button>
            </div>
        </div>
        <div class="informacoes-patrimonio-card">
            <p class="titulo-pequeno">Detalhes</p>
            <div style="width: 100%;">
                <div class="sep-detalhes" style="display: flex; flex-direction: column;">
                    <div style="display: flex; height: 30px; gap: 5px;">
                        <img class="icone-informacoes" src="assets/icones/etiqueta_branco.png" alt="">
                        <p class="subtitulo-medio">Categoria</p>
                    </div>
                    <p> Maquinas e Equipamentos</p>
                </div>
            </div>
        </div>
    </main>
    <script src="assets/js/dashboard.js"></script>
</body>


</html>
